server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Azure DNS resolver — resolves Azure Container Apps FQDNs
    resolver 168.63.129.16 valid=30s ipv6=off;

    # Proxy API requests to Gateway via Azure FQDN over HTTPS
    location ~ ^/(users|projects|tasks|teams|sprints|subtasks|comments|notifications|activities|attachments|analytics|issues|versions|links|filters|hubs)(/|$) {
        # If the request accepts HTML, it's a browser page refresh, so fallback to index.html
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }

        # Use the correct Azure Container Apps FQDN (external)
        set $backend https://gatewayapi.thankfulfield-a059e51b.centralindia.azurecontainerapps.io;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name gatewayapi.thankfulfield-a059e51b.centralindia.azurecontainerapps.io;
        proxy_ssl_verify off;
        proxy_set_header Host gatewayapi.thankfulfield-a059e51b.centralindia.azurecontainerapps.io;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Fallback to index.html for Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
