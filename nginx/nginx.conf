user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr status: $upstream_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Global Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com https://cdnjs.cloudflare.com;" always;

    # Upstream Definitions
    upstream portfolio_upstream {
        server portfolio:80;
    }

    upstream hirenow_frontend_upstream {
        server ats_angular_frontend:80;
    }

    upstream hirenow_backend_upstream {
        server ats_api_backend:80;
    }

    upstream workflow_gateway_upstream {
        server workflow-gatewayapi:8080;
    }

    # Helper server for proxy-level health checks
    server {
        listen 80;
        server_name localhost;

        location /nginx-health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"healthy","service":"nginx-proxy"}';
        }
    }

    # Virtual Host 1: Portfolio Website
    server {
        listen 80;
        server_name himanshuprojectportfolio.xyz www.himanshuprojectportfolio.xyz;

        location /api/contact {
            proxy_pass https://formsubmit.co/ajax/himanshutrip780@gmail.com;
            proxy_set_header Host formsubmit.co;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        location / {
            proxy_pass http://portfolio_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Virtual Host 2: HireNow Application
    server {
        listen 80;
        server_name hirenow.himanshuprojectportfolio.xyz;

        # API requests
        location /api/ {
            proxy_pass http://hirenow_backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase upload limits for resume files
            client_max_body_size 10M;
        }

        # Static assets / Uploaded resumes served by API
        location /uploads/ {
            proxy_pass http://hirenow_backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Angular frontend
        location / {
            proxy_pass http://hirenow_frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Virtual Host 3: Workflow.io Application
    server {
        listen 80;
        server_name workflow.himanshuprojectportfolio.xyz;

        location / {
            proxy_pass http://workflow_gateway_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets support for Realtime SignalR hubs
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            client_max_body_size 20M;
        }
    }
}
