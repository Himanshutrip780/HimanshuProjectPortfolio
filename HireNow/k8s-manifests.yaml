apiVersion: v1
kind: Namespace
metadata:
  name: ats
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-pvc
  namespace: ats
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-db
  namespace: ats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ats-db
  template:
    metadata:
      labels:
        app: ats-db
    spec:
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              value: "Password_123_Strong!"
          volumeMounts:
            - name: mssql-storage
              mountPath: /var/opt/mssql
      volumes:
        - name: mssql-storage
          persistentVolumeClaim:
            claimName: mssql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: ats
spec:
  ports:
    - port: 1433
      targetPort: 1433
  selector:
    app: ats-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-backend
  namespace: ats
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ats-backend
  template:
    metadata:
      labels:
        app: ats-backend
    spec:
      containers:
        - name: backend
          image: ats-backend:latest
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__DefaultConnection
              value: "Server=db;Database=ATS_Db;User Id=sa;Password=Password_123_Strong!;TrustServerCertificate=True;MultipleActiveResultSets=true;"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ats
spec:
  ports:
    - port: 5000
      targetPort: 80
  selector:
    app: ats-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ats-frontend
  namespace: ats
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ats-frontend
  template:
    metadata:
      labels:
        app: ats-frontend
    spec:
      containers:
        - name: frontend
          image: ats-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ats
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: ats-frontend
